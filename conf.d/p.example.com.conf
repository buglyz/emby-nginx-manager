server {
    listen 80;
    listen [::]:80;
    server_name ${you_domain};

    location ^~ /.well-known/acme-challenge/ {
        root ${acme_http_webroot};
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen ${you_frontend_port} ssl;
    listen [::]:${you_frontend_port} ssl;
    http2 on;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;

    server_name                ${you_domain}; # 填由 Nginx 加载的 SSL 证书中包含的域名，建议将域名指向服务端的 IP

    ssl_certificate            ${ssl_certificate_path};
    ssl_certificate_key        ${ssl_certificate_key_path};

    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                TLS13_AES_128_GCM_SHA256:TLS13_AES_256_GCM_SHA384:TLS13_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  on;
    ssl_early_data      off;

    resolver                   ${resolver};
    resolver_timeout           5s;


    client_header_timeout      1h;
    keepalive_timeout          30m;
    client_header_buffer_size  8k;

    # Emby clients are more stable over HTTPS/HTTP2; clear any cached HTTP3 Alt-Svc entry.
    proxy_hide_header Alt-Svc;
    add_header Alt-Svc 'clear' always;

${backstream_config}
    location ${you_domain_path} {
        set $website                          ${r_domain_full};
        ${you_domain_path_rewrite}
        early_hints $early_hints;
        proxy_pass                            $website;

        proxy_set_header Host                 $proxy_host;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    $scheme;
        proxy_set_header X-Forwarded-Host     $host;
        proxy_set_header X-Forwarded-Port     $server_port;

        proxy_http_version                    1.1; 
        proxy_cache_bypass                    $http_upgrade;

        proxy_ssl_server_name                 on;

        proxy_set_header Upgrade              $http_upgrade;
        proxy_set_header Connection           $connection_upgrade;
        
        proxy_connect_timeout                 60s;
        proxy_send_timeout                    1h;
        proxy_read_timeout                    1h;

${location_proxy_redirect}
    }

${handle_redirect_config}}
